name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        run: mvn clean test

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push config-server image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: config-server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-config-server:latest

      - name: Build and push discovery-service image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: discovery-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-discovery-service:latest

      - name: Build and push api-gateway image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api-gateway/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-api-gateway:latest

      - name: Build and push user-service image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: user-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-user-service:latest

      - name: Build and push product-service image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: product-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-product-service:latest

      - name: Build and push order-service image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: order-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-order-service:latest

      - name: Build and push notification-service image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: notification-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-notification-service:latest
