apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: your-dockerhub-user/ecommerce-api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: CONFIG_SERVER_URL
              value: http://config-server:8888
            - name: EUREKA_SERVER_URL
              value: http://discovery-service:8761/eureka
            - name: USER_SERVICE_URL
              value: http://user-service:8081
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:8082
            - name: ORDER_SERVICE_URL
              value: http://order-service:8083
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8084
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
